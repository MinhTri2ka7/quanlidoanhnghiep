# Profile DEV: dùng H2 in-memory để chạy nhanh, không cần cài DB.
# Khi muốn chuyển sang MySQL thật, đổi sang profile prod hoặc sửa block này.
spring:
  datasource:
    url: jdbc:h2:mem:quanlydn;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
